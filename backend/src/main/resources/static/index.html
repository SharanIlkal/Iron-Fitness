<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gym Login</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: black;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-container {
    background: #000000;
    padding: 40px;
    width: 350px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 15px rgb(255, 255, 255);
    animation: fadeIn 1s ease-in-out;
}

h2 {
    margin-bottom: 25px;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: transparent;
    border: 2px solid #444;
    border-radius: 6px;
    color: white;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: rgb(255, 255, 255);
    box-shadow: 0 0 8px rgb(255, 255, 255);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(45deg, cyan, rgb(255, 0, 200));
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(45deg, rgb(255, 255, 255), cyan);
    box-shadow: 0 0 15px cyan;
    transform: scale(1.05);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin-Login</h2>
    <form method="POST" action="/auth/login" autocomplete="off">
        <input name="username" placeholder="Username" autocomplete="off" required>
        <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
