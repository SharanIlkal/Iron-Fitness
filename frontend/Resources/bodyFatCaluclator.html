<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Body Fat Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#000000,#1a1a1a,#1b1a1a);
color:white;
}


.container{
width:400px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:relative;
overflow:hidden;
}


.container::before{
content:"";
position:absolute;
width:200%;
height:200%;

}

.container::after{
content:"";
position:absolute;
inset:2px;
background:#000000;
border-radius:13px;
z-index:1;
}

.container *{
position:relative;
z-index:2;
}


@keyframes rotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

h1{
text-align:center;
margin-bottom:25px;
letter-spacing:2px;
text-shadow:
0 0 10px #ffffff00,
0 0 20px #ffffff00;
}

label{
display:block;
margin-top:15px;
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
background:#111;
border:none;
border-radius:8px;
color:white;
outline:none;
box-shadow: inset 0 0 px #ffffff;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#ffffff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:
0 0 20px #000000,
0 0 60px #202020;
}



.result{
margin-top:20px;
text-align:center;
font-size:24px;
}



.progress{
width:100%;
height:18px;
background:#222;
border-radius:20px;
margin-top:15px;
overflow:hidden;

box-shadow: inset 0 0 5px #000;

}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ffffff,#ffffff,#ffffff);
box-shadow:
0 0 10px #ffffff,
0 0 20px #ffffff;
transition:width 1s ease;
}

.category{
text-align:center;
margin-top:10px;
color:#aaa;
}

</style>
</head>
<body>
   <div class="container">
      <h1 style="font-weight: 300;">BODY <span style="color: red;">FAT</span> CALCULATOR</h1>
      <label>Gender</label>
      <select id="gender">
         <option value="male">Male</option>
         <option value="female">Female</option>
      </select>
      <label>Height (cm)</label>
      <input type="number" id="height">
      <label>Neck (cm)</label>
      <input type="number" id="neck">
      <label>Waist (cm)</label>
      <input type="number" id="waist">
      <label>Hip (cm) for females</label>
      <input type="number" id="hip">
      <button onclick="calculateFat()">CALCULATE</button>
      <div class="result" id="result"></div>
      <div class="progress">
         <div class="progress-bar" id="bar"></div>
      </div>
      <div class="category" id="category"></div>
   </div>
   <script>
      function calculateFat(){
      let gender=document.getElementById("gender").value;
      let height=parseFloat(document.getElementById("height").value);
      let neck=parseFloat(document.getElementById("neck").value);
      let waist=parseFloat(document.getElementById("waist").value);
      let hip=parseFloat(document.getElementById("hip").value);
      let fat;
      if(gender==="male"){
      fat=86.010*Math.log10(waist-neck)
         -70.041*Math.log10(height)
         +36.76;
      }
      else{
      fat=163.205*Math.log10(waist+hip-neck)
         -97.684*Math.log10(height)
         -78.387;
      }
      
      fat=fat.toFixed(2);
      document.getElementById("result").innerHTML=fat+" %";
      document.getElementById("bar").style.width=fat+"%";
      let category="";
      if(fat<10) category="Essential Fat";
      else if(fat<18) category="Athletic";
      else if(fat<25) category="Fitness";
      else if(fat<32) category="Average";
      else category="Obese";
      document.getElementById("category").innerHTML=category;
      }
      
   </script>
</body>
</html>
